# CI — the loop nobody can skip.
# Mirrors the local gates deterministically: if it isn't green here, it isn't
# done, regardless of what any agent or human claims.
#
# This app is keyless (no DB, no auth, no email — see ADR-0001), so there are no
# service secrets and no Playwright browser install. E2E is verified via browser
# MCP recordings (TC-STACK-05), so the E2E step is informational.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # --- static, fast, deterministic ---
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Traceability chain (and freshness of generated report)
        env:
          RELEASE_FLAG: ${{ (github.ref_name == 'main' || github.ref_name == 'master') && '--release' || '' }}
        run: |
          node scripts/check-traceability.mjs --check-fresh
          node scripts/check-traceability.mjs $RELEASE_FLAG
      - name: Trajectory process audit (and freshness)
        env:
          RELEASE_FLAG: ${{ (github.ref_name == 'main' || github.ref_name == 'master') && '--release' || '' }}
        run: |
          node scripts/check-trajectory.mjs --check-fresh
          node scripts/check-trajectory.mjs $RELEASE_FLAG
      - name: OpenSpec strict validation
        run: npx openspec validate --all --strict
      - name: Dependency audit (fail on high+)
        run: npm audit --audit-level=high

      # --- test battery ---
      - name: Unit tests + coverage
        run: npm run test:coverage
      - name: Coverage ratchet
        run: node scripts/check-coverage-ratchet.mjs
      - name: Integration tests (lib + route handlers vs fixtures)
        run: npm run test:integration
      - name: E2E (browser MCP recordings — informational)
        run: npm run test:e2e

      # --- production build ---
      - name: Build
        run: npm run build

      # --- evidence ---
      - name: Upload QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-evidence
          path: |
            docs/qa/traceability-report.md
            trace/trace.json
            coverage/coverage-summary.json
          if-no-files-found: ignore
